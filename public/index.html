<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PPD Risk Assessment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f7f5f2;
      margin: 0;
      padding: 2rem;
      color: #2c2c2c;
    }

    .container {
      max-width: 700px;
      margin: auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 2rem;
    }

    button {
      display: block;
      margin: 2rem auto;
      padding: 1rem 2rem;
      font-size: 1rem;
      border-radius: 999px;
      border: none;
      background: #a55c3b;
      color: white;
      cursor: pointer;
    }

    .result-card {
      background: white;
      border-radius: 16px;
      padding: 1.5rem;
      margin-top: 2rem;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    .result-icon {
      font-size: 2rem;
    }

    .result-label {
      font-weight: bold;
      margin-top: 0.5rem;
      letter-spacing: 1px;
    }

    .result-title {
      font-size: 1.4rem;
      margin: 1rem 0;
    }

    .result-prob {
      font-size: 3rem;
      font-weight: bold;
      margin: 0.5rem 0;
    }

    .prob-bar-bg {
      background: #eee;
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      margin: 1rem 0;
    }

    .prob-bar-fill {
      height: 100%;
      background: #a55c3b;
      width: 0%;
      transition: width 0.6s ease;
    }

    .prob-scale {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: #777;
    }

    .result-desc {
      margin: 1rem 0;
      font-size: 0.95rem;
    }

    .result-disclaimer {
      margin-top: 1rem;
      font-size: 0.8rem;
      color: #666;
      background: #f2f2f2;
      padding: 0.8rem;
      border-radius: 10px;
    }

    .error {
      margin-top: 1rem;
      padding: 1rem;
      background: #ffe6e6;
      color: #a94442;
      border-radius: 10px;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Postpartum Depression Risk Assessment</h1>

    <button onclick="runPrediction()">Run Risk Assessment</button>

    <div id="errorBox" class="error" style="display:none;"></div>
    <div id="results"></div>
  </div>

  <script>
    async function runPrediction() {
      const resultsDiv = document.getElementById("results");
      const errorBox = document.getElementById("errorBox");

      errorBox.style.display = "none";
      resultsDiv.innerHTML = "";

      try {
        const response = await fetch("/api/predict", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({})
        });

        const result = await response.json();

        const pct = ((result.risk_probability ?? 0) * 100).toFixed(1);
        const level = result.risk_label?.toLowerCase() || "moderate";
        const prob = result.risk_probability ?? 0;

        const config = {
          low: {
            icon: "✓",
            label: "Lower Risk",
            desc: "This screening suggests a lower level of risk at this time."
          },
          moderate: {
            icon: "⚠",
            label: "Elevated Risk",
            desc: "This screening suggests elevated risk. Follow-up with a healthcare professional is recommended."
          },
          high: {
            icon: "⚑",
            label: "Higher Risk",
            desc: "This screening suggests higher risk. Please seek follow-up with a healthcare professional."
          }
        };

        const c = config[level] || config.moderate;

        resultsDiv.innerHTML = `
          <div class="result-card ${level}">
            <div class="result-icon">${c.icon}</div>
            <div class="result-label">${c.label}</div>
            <div class="result-title">Risk Assessment Result</div>
            <div class="result-prob">${pct}%</div>

            <div class="prob-bar-bg">
              <div class="prob-bar-fill"></div>
            </div>

            <div class="prob-scale">
              <span>0%</span>
              <span>Threshold: 10%</span>
              <span>100%</span>
            </div>

            <p class="result-desc">${c.desc}</p>

            <div class="result-disclaimer">
              <strong>Important:</strong> This is a screening estimate, not a diagnosis. Please consult a healthcare professional.
            </div>
          </div>
        `;

        requestAnimationFrame(() => {
          const bar = document.querySelector(".prob-bar-fill");
          if (bar) bar.style.width = `${prob * 100}%`;
        });

      } catch (err) {
        errorBox.innerText = "Prediction failed. Please try again.";
        errorBox.style.display = "block";
      }
    }
  </script>
</body>
</html>
